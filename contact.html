<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact | TaskFlow UI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Navigation -->

    <nav>

        <h2 class="logo">TaskFlow UI</h2>

        <ul>

            <li>
                <a href="index.html">Home</a>
            </li>

            <li>
                <a href="contact.html">Contact</a>
            </li>

            <li>
                <a href="tasks.html">Tasks</a>
            </li>

        </ul>

    </nav>

    <!-- Contact Section -->

    <section class="contact-section">

        <div class="page-header">

            <h1>
                Contact Our Team
            </h1>

        </div>

        <form id="contactForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
            >

            <input
                type="email"
                id="email"
                placeholder="Email Address"
            >

            <textarea
                id="message"
                placeholder="Your Message"
            ></textarea>

            <button type="submit">

                Send Message

            </button>

        </form>

        <!-- Validation Message -->

        <div id="formMessage"></div>

        <!-- Next Page Button -->

        <div class="page-links">

            <a href="tasks.html"
               class="btn">

                Open Task Manager

            </a>

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <h3>
            TaskFlow UI
        </h3>

        <p>

            Professional Contact Experience

        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
